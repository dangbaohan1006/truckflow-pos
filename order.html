<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Đặt món - TruckFlow</title>
    <!-- Import Plus Jakarta Sans for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
      }
      
      body { 
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #FDFCF8;
        color: #23281B;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      /* Desktop Device Frame Style */
      @media (min-width: 481px) {
        body {
          background: linear-gradient(135deg, rgba(74, 93, 35, 0.12) 0%, rgba(226, 132, 19, 0.08) 50%, rgba(253, 252, 248, 0.95) 100%),
                      url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=2078&auto=format&fit=crop') no-repeat center center;
          background-size: cover;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
        }

        #root {
          width: 393px;
          height: 852px;
          background: #FDFCF8;
          border-radius: 50px;
          border: 12px solid #1e1e1e;
          box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.4),
                      0 0 0 1px #2d2d2d,
                      inset 0 0 0 2px rgba(255, 255, 255, 0.1);
          overflow: hidden;
          position: relative;
        }

        /* Dynamic Island */
        #root::before {
          content: '';
          position: absolute;
          top: 14px;
          left: 50%;
          transform: translateX(-50%);
          width: 108px;
          height: 28px;
          background: #000000;
          border-radius: 14px;
          z-index: 9999;
          box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(142, 151, 117, 0.3);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(142, 151, 117, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/order-main.tsx"></script>
  </body>
</html>
