version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: truckflow_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: truckflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: truckflow_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    container_name: truckflow_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/truckflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # JWT Configuration
      - JWT_ACCESS_TTL_MINUTES=15
      - JWT_REFRESH_TTL_DAYS=30
      - JWT_PRIVATE_KEY_PATH=/app/secrets/jwt_private.pem
      - JWT_PUBLIC_KEY_PATH=/app/secrets/jwt_public.pem
    volumes:
      - .:/app
      - jwt_secrets:/app/secrets
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: truckflow_celery
    command: celery -A src.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/truckflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  jwt_secrets:
